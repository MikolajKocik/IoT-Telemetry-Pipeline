apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api-deployment
  labels:
    app: ingestion-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
    spec:
      containers:
      - name: api
        image: mkocik/iot-ingestion-api:v1.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: iot-config
        - secretRef:
            name: iot-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: ingestion-api-service
spec:
  type: ClusterIP
  selector:
    app: ingestion-api
  ports:
  - port: 80
    targetPort: 8080