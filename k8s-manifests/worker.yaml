apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-worker-deployment
spec:
  selector:
    matchLabels:
      app: data-worker
  template:
    metadata:
      labels:
        app: data-worker
    spec:
      containers:
      - name: worker
        image: mkocik/iot-data-worker:v1.0
        imagePullPolicy: Never
        env:
        - name: REDIS_CONNECTION
          value: "redis-service:6379"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
